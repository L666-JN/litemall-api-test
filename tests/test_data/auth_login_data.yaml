login_success:
  description: 正确的用户名和密码登录
  module: 登录
  priority: P0
  method: POST
  need_auth: false
  endpoint: /wx/auth/login
  expected:
    errno: 0
    errmsg: 成功
    has_data: true
    fields:
    - token
    - userInfo
    - userInfo.nickName
  request:
    username: user123
    password: user123

login_wrong_password:
  description: 密码错误登录
  module: 登录
  priority: P0
  method: POST
  need_auth: false
  endpoint: /wx/auth/login
  expected:
    errno: 700
    has_data: false
  request:
    username: user123
    password: wrong_password

login_nonexistent_user:
  description: 不存在的用户名登录
  module: 登录
  priority: P1
  method: POST
  need_auth: false
  endpoint: /wx/auth/login
  expected:
    errno: 700
    errmsg_contains: 账号不存在
    has_data: false
  request:
    username: no_such_user_999
    password: '123456'

login_empty_username:
  description: 用户名为空登录
  module: 登录
  priority: P0
  method: POST
  need_auth: false
  endpoint: /wx/auth/login
  expected:
    errno_not: 0
    has_data: false
  request:
    username: ''
    password: user123

login_empty_password:
  description: 密码为空登录
  module: 登录
