order_list_success:
  description: 认证用户查看订单列表
  module: 订单列表
  priority: P0
  method: GET
  need_auth: true
  endpoint: /wx/order/list
  expected:
    errno: 0
    errmsg: 成功
    has_data: true
    fields:
    - total
    - pages
    - list

