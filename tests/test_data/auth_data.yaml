# Litemall 认证模块 全部测试数据（合并版）
# 由 scripts/excel_to_yaml.py 自动生成

login_empty_both:
  description: 用户名和密码都为空登录
  module: 登录
  priority: P1
  method: POST
  need_auth: false
  endpoint: /wx/auth/login
  expected:
    errno_not: 0
  request:
    username: ''
    password: ''

login_empty_password:
  description: 密码为空登录
  module: 登录
  priority: P0
  method: POST
  need_auth: false
  endpoint: /wx/auth/login
  expected:
    errno_not: 0
  request:
    username: user123
    password: ''

login_empty_username:
  description: 用户名为空登录
  module: 登录
  priority: P0
  method: POST
  need_auth: false
  endpoint: /wx/auth/login
  expected:
    errno_not: 0
  request:
    username: ''
    password: user123

login_nonexistent_user:
  description: 不存在的用户名登录
  module: 登录
  priority: P1
  method: POST
  need_auth: false
  endpoint: /wx/auth/login
  expected:
    errno: 700
    errmsg_contains: 账号不存在
  request:
    username: no_such_user_999
    password: '123456'

login_sql_injection:
  description: SQL注入尝试登录（安全测试）
  module: 登录
  priority: P1
  method: POST
  need_auth: false
  endpoint: /wx/auth/login
  expected:
    errno_not: 0
  request:
    username: admin' OR '1'='1
    password: admin' OR '1'='1

login_success:
  description: 正确的用户名和密码登录
  module: 登录
  priority: P0
  method: POST
  need_auth: false
  endpoint: /wx/auth/login
  expected:
    errno: 0
    errmsg: 成功
    has_data: true
    fields:
    - token
    - userInfo
    - userInfo.nickName
  request:
    username: user123
    password: user123

login_username_with_spaces:
